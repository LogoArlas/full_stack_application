<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Note</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <nav>
                
                <a href="login.html">Logout</a>
                <img src="todo_list_image.jpg" alt="To-Do list picture">

            </nav>
        </header>
            <main>
                
                <form id="note-form">
                    <label for="note">Note</label>

                </form>

            </main>
        <footer>Note App</footer>
    </body>
</html>
